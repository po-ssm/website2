<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gesundheitsorientiertes Pferdetraining</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      color: #333;
      line-height: 1.6;
    }

    header {
      background: url("https://images.unsplash.com/photo-1598974357801-cbca100e65d3?q=80&w=1600") center/cover no-repeat;
      color: white;
      height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    header h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    header p {
      font-size: 18px;
      opacity: 0.9;
    }

    section {
      max-width: 1000px;
      margin: auto;
      padding: 60px 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #2f4f4f;
    }

    .about {
      text-align: center;
      font-size: 18px;
      max-width: 700px;
      margin: auto;
    }

    .grid {
      display: grid;
      gap: 30px;
    }

    @media(min-width: 700px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .card {
      background: #fafafa;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .quote {
      text-align: center;
      font-style: italic;
      font-size: 20px;
      color: #555;
      margin-top: 30px;
    }

    .contact {
      text-align: center;
    }

    footer {
      background: #f0f0f0;
      text-align: center;
      padding: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <div>
    <h1>Im Einklang mit dem Pferd</h1>
    <p>Gesundheitsorientiertes Training · Achtsam · Feinsinnig</p>
  </div>
</header>
